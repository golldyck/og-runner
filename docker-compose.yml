services:
  backend:
    build:
      context: ./backend
    container_name: og-runner-backend
    environment:
      CORS_ORIGINS: '["http://localhost:8080","http://127.0.0.1:8080"]'
      OG_PRIVATE_KEY: ${OG_PRIVATE_KEY:-}
      OG_RPC_URL: ${OG_RPC_URL:-https://ogevmdevnet.opengradient.ai}
      OG_API_URL: ${OG_API_URL:-https://sdk-devnet.opengradient.ai}
      OG_INFERENCE_CONTRACT_ADDRESS: ${OG_INFERENCE_CONTRACT_ADDRESS:-0x8383C9bD7462F12Eb996DD02F78234C0421A6FaE}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: og-runner-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
